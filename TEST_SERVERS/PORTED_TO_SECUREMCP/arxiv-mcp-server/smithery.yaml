# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

build:
  dockerfile: Dockerfile
  dockerBuildPath: .

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required: []
    properties:
      arxivStoragePath:
        type: string
        default: /tmp/arxiv-papers
        description: The path to store downloaded papers. Defaults to /tmp/arxiv-papers.
  commandFunction:
    # A JS function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'python', args: ['-m', 'arxiv_mcp_server', '--storage-path', config.arxivStoragePath || '/tmp/arxiv-papers'] })
