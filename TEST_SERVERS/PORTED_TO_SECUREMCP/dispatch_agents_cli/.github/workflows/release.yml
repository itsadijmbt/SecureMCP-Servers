name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version_policy:
    uses: ./.github/workflows/version-policy-reusable.yml
    with:
      mode: release

  ci:
    name: CI
    needs: version_policy
    uses: ./.github/workflows/ci-reusable.yml
    with:
      upload_dist_artifact: true

  release:
    name: GitHub Release
    needs: [version_policy, ci]
    if: needs.version_policy.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: dist
          path: dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.version_policy.outputs.current_tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "$TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi
