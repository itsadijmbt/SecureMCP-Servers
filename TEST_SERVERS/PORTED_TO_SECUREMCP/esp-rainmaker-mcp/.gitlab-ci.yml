stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

test:python3.10:
  stage: test
  image: python:3.10
  before_script:
    - pip install uv
    - uv sync
  script:
    - echo "Comprehensive testing with Python 3.10"
    - uv run python --version
    - uv run python test_mcp_server.py
    - echo "Python 3.10 comprehensive tests completed"

